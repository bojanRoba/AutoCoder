name: Autocoder Bot Pipeline

on:
  issues:
    types: [opened, labeled, edited]

# Set explicit, least-privilege permissions for the GITHUB_TOKEN
permissions:
  issues: read
  contents: read

jobs:
  generate-code:
    name: Generate Code with ChatGPT
    runs-on: ubuntu-latest
    # Job-level condition: Execute ONLY if the issue has the 'autocoder-bot' label
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Script Executable
        run: chmod +x ./scripts/script.sh

      - name: Run Autocoder Script
        id: generate_code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # Pass environment variables in the exact order required by script positional arguments ($1 $2 $3 $4)
        run: |
          ./scripts/script.sh "$GITHUB_TOKEN" "$REPOSITORY" "$ISSUE_NUMBER" "$OPENAI_API_KEY"

      - name: Upload Autocoder Artifact
        uses: actions/upload-artifact@v4
        with:
          name: autocoder-artifact
          # Uploads the entire directory generated by the bash script
          path: autocoder-bot/
          if-no-files-found: error
          retention-days: 7

      - name: Download Autocoder Artifact
        uses: actions/download-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-artifact

      - name: Display Generated Code (Recursive List)
        run: |
          echo "=== Recursively listing all generated files and directories ==="
          ls -laR autocoder-artifact/
