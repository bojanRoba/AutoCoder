name: Interacting with LLMs - AutoCoder Bot

on:
  issues:
    types: [opened, reopened, labeled]

jobs:
  generate-code:
    name: Generate Code with ChatGPT
    runs-on: ubuntu-latest
    
    # Job-level condition: Execute ONLY if the issue has the 'autocoder-bot' label
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')

    permissions:
      contents: read
      issues: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Script Executable
        run: chmod +x ./scripts/script.sh

      - name: Run AutoCoder Script
        id: generate_code
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        # Passing variables as positional arguments as required by the script structure
        run: ./scripts/script.sh ${{ env.ISSUE_NUMBER }} ${{ env.REPOSITORY }} ${{ env.GITHUB_TOKEN }} ${{ env.OPENAI_API_KEY }}

      - name: Upload Generated Code Artifact
        uses: actions/upload-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-bot/
          if-no-files-found: error

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-artifact

      - name: Display Generated Code Structure
        run: |
          echo "Listing all generated files and directories recursively:"
          ls -lR autocoder-artifact
