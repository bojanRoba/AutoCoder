name: Autocoder Bot Pipeline

# Trigger workflow on issue events (opening, editing, or labeling)
on:
  issues:
    types: [opened, labeled, edited]

jobs:
  generate-code:
    name: Generate Code with ChatGPT
    runs-on: ubuntu-latest
    
    # OBJECTIVE: Job-level IF statement to check for the 'autocoder-bot' label
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')

    steps:
      # 1. Checkout the repository to access scripts/script.sh
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. OBJECTIVE: Make the script file executable by adding execute +x permission
      - name: Set permissions for script
        run: chmod +x ./scripts/script.sh

      # 3. OBJECTIVE: Identify env vars and pass them in the expected order
      # Order required by script: 1) GITHUB_TOKEN 2) REPOSITORY 3) ISSUE_NUMBER 4) OPENAI_API_KEY
      - name: Run script.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ./scripts/script.sh "$GITHUB_TOKEN" "$REPOSITORY" "$ISSUE_NUMBER" "$OPENAI_API_KEY"

      # 4. OBJECTIVE: Upload the returned content as an artifact named 'autocoder-artifact'
      - name: Upload generated files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-bot/
          if-no-files-found: error

      # 5. OBJECTIVE: Download the artifact to a directory named 'autocoder-artifact'
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: autocoder-artifact
          path: autocoder-artifact

      # 6. OBJECTIVE: List all files and directories recursively
      - name: List files in the artifact
        run: |
          echo "Listing generated files and directories recursively:"
          ls -R autocoder-artifact
